<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#2457ff">
  <title>Kynisto is offline</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:24px;display:grid;place-items:center;background:#f4f7fc;color:#0b1736;font:16px/1.5 system-ui,sans-serif}.card{width:min(430px,100%);padding:34px;border:1px solid #dbe4f3;border-radius:26px;background:#fff;box-shadow:0 22px 60px rgba(11,23,54,.12);text-align:center}.mark{width:68px;height:68px;margin:auto;display:grid;place-items:center;border-radius:20px;background:#2457ff;color:#fff;font-size:36px;font-weight:900}.mark span{color:#20c7e8}h1{margin:20px 0 8px;font-size:28px;letter-spacing:-.04em}p{margin:0;color:#61708b}button{margin-top:24px;min-height:46px;padding:0 22px;border:0;border-radius:13px;background:#0b1736;color:#fff;font-weight:750;cursor:pointer}@media(prefers-color-scheme:dark){body{background:#071126;color:#f4f8ff}.card{border-color:#263b67;background:#101f3f}p{color:#9fb0d0}button{background:#2457ff}}
  </style>
</head>
<body><main class="card"><div class="mark">K<span>.</span></div><h1>You’re offline</h1><p>Kynisto will reconnect automatically when your internet returns. Your account remains signed in.</p><button onclick="location.reload()">Try again</button></main><script>addEventListener("online",()=>location.reload())</script></body>
</html>
